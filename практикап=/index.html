<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Аспро.Cloud — акция для команды (Vue + БЭМ)</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js">
    </script>
    <style>
        /* ============================================================
           UI-Kit Аспро.Cloud (БЭМ) + Vue-компоненты
           Версия: 2.1.0
           ============================================================ */

        /* ---------- Переменные (тёмная тема по умолчанию) ---------- */
        :root {
            --bg: #0b0d12;
            --surface: #131820;
            --border: #262c38;
            --text: #edf0f5;
            --text-second: #919bb0;
            --accent: #4a7cff;
            --accent-hover: #3a6be0;
            --gradient: linear-gradient(135deg, #4a7cff 0%, #ff6bcb 100%);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 8px;
            --shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
            --shadow-hover: 0 8px 30px rgba(74, 124, 255, 0.15);
            --font: 'Inter', system-ui, -apple-system, sans-serif;
            --transition: 0.3s ease;
            --header-height: 72px;
            --banner-height: 48px;
            --header-bg: rgba(11, 13, 18, 0.92);
            --surface-hover: rgba(255, 255, 255, 0.04);
        }

        /* ---------- Светлая тема ---------- */
        [data-theme="light"] {
            --bg: #f5f7fa;
            --surface: #ffffff;
            --border: #dce0e8;
            --text: #1a1a2e;
            --text-second: #6a6a8a;
            --shadow: 0 12px 30px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 8px 30px rgba(74, 124, 255, 0.15);
            --header-bg: rgba(255, 255, 255, 0.92);
            --surface-hover: rgba(0, 0, 0, 0.04);
        }

        /* ---------- Сброс и база ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding-top: calc(var(--header-height) + var(--banner-height));
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1240px;
            margin: 0 auto;
            padding: 0 1.8rem;
        }

        /* ---------- Кнопки (БЭМ) ---------- */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.6rem 1.5rem;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            white-space: nowrap;
            font-family: var(--font);
            background: transparent;
            color: var(--text);
        }

        .btn--primary {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 16px rgba(74, 124, 255, 0.3);
        }
        .btn--primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 6px 24px rgba(74, 124, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn--secondary {
            background: var(--surface-hover);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn--secondary:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .btn--outline {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn--outline:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(74, 124, 255, 0.05);
        }

        .btn--white {
            background: #fff;
            color: #1a1a2e;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }
        .btn--white:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        }

        .btn--ghost {
            background: transparent;
            color: var(--text-second);
            border: none;
            padding: 0.4rem 0.8rem;
        }
        .btn--ghost:hover {
            color: var(--text);
        }

        .btn--lg {
            padding: 0.9rem 2.6rem;
            font-size: 1.1rem;
        }

        .btn--sm {
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
        }

        .btn--block {
            width: 100%;
            justify-content: center;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn--theme {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 38px;
            height: 38px;
            padding: 0;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-second);
            transition: var(--transition);
            cursor: pointer;
        }
        .btn--theme:hover {
            border-color: var(--accent);
            color: var(--text);
            background: rgba(74, 124, 255, 0.05);
        }

        /* ---------- Бейджи ---------- */
        .badge {
            display: inline-block;
            padding: 0.1rem 0.7rem;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge--accent {
            background: var(--accent);
            color: #fff;
        }

        .badge--gradient {
            background: var(--gradient);
            color: #fff;
        }

        .badge--success {
            background: #2ed573;
            color: #fff;
        }

        .badge--warning {
            background: #ffa502;
            color: #fff;
        }

        /* ============================================================
           КОМПОНЕНТЫ СТРАНИЦЫ (БЭМ)
           ============================================================ */

        /* ---------- Баннер ---------- */
        .banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1001;
            background: var(--gradient);
            padding: 0.7rem 2rem;
            text-align: center;
            font-weight: 600;
            font-size: 1rem;
            color: #fff;
            height: var(--banner-height);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
        }
        .banner--hidden {
            transform: translateY(-100%);
        }

        /* ---------- Шапка ---------- */
        .header {
            position: fixed;
            top: var(--banner-height);
            left: 0;
            right: 0;
            z-index: 1000;
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 1.8rem;
            height: var(--header-height);
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: top 0.3s ease, background 0.3s ease, border-color 0.3s ease;
        }
        .header--sticky {
            top: 0;
        }

        .header__container {
            width: 100%;
            max-width: 1240px;
            margin: 0 auto;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
        }

        .header__logo {
            font-weight: 700;
            font-size: 1.4rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .header__nav {
            display: flex;
            gap: 0.2rem;
            align-items: center;
            flex-wrap: nowrap;
        }

        .header__nav-item {
            position: relative;
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            color: var(--text-second);
            font-weight: 500;
            font-size: 0.85rem;
            transition: color 0.2s;
            white-space: nowrap;
            border-radius: 8px;
        }
        .header__nav-item:hover {
            color: var(--text);
            background: var(--surface-hover);
        }
        .header__nav-item .arrow {
            font-size: 0.6rem;
            margin-left: 0.2rem;
            transition: transform 0.2s;
        }
        .header__nav-item:hover .arrow {
            transform: rotate(180deg);
        }

        .header__nav-item--link {
            text-decoration: none;
        }

        /* ---------- Выпадающие меню ---------- */
        .dropdown {
            position: absolute;
            top: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%) translateY(-8px);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            min-width: 580px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.25s ease;
            box-shadow: var(--shadow);
            z-index: 100;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0.5rem 1.5rem;
        }
        .dropdown--wide {
            min-width: 720px;
            grid-template-columns: 1fr 1fr 1fr 1fr;
        }
        .dropdown--medium {
            min-width: 480px;
            grid-template-columns: 1fr 1fr;
        }

        .header__nav-item:hover .dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .dropdown__col {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .dropdown__title {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--text-second);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0.2rem 0 0.3rem 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 0.2rem;
        }

        .dropdown__link {
            display: block;
            padding: 0.3rem 0.4rem;
            color: var(--text-second);
            text-decoration: none;
            font-size: 0.82rem;
            transition: all 0.15s;
            border-radius: 4px;
        }
        .dropdown__link:hover {
            color: var(--text);
            background: rgba(74, 124, 255, 0.08);
        }
        .dropdown__link .badge-free {
            color: var(--accent);
            font-size: 0.6rem;
            font-weight: 600;
            margin-left: 0.3rem;
        }

        /* ---------- Телефон в шапке ---------- */
        .header-phone {
            position: relative;
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .header-phone__number {
            color: var(--text);
            font-weight: 500;
            font-size: 0.85rem;
            text-decoration: none;
            white-space: nowrap;
            cursor: pointer;
            padding: 0.3rem 0.6rem;
            border-radius: 8px;
            transition: background 0.2s, color 0.3s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .header-phone__number:hover {
            background: var(--surface-hover);
        }
        .header-phone__number svg {
            width: 14px;
            height: 14px;
            fill: var(--text-second);
            flex-shrink: 0;
            stroke: var(--text-second);
        }

        .header-phone__dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.8rem 1.2rem;
            min-width: 200px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-8px);
            transition: all 0.25s ease;
            box-shadow: var(--shadow);
            z-index: 100;
        }
        .header-phone:hover .header-phone__dropdown {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .header-phone__dropdown-phone {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            display: block;
            margin-bottom: 0.3rem;
        }
        .header-phone__dropdown-label {
            font-size: 0.75rem;
            color: var(--text-second);
            display: block;
            margin-bottom: 0.5rem;
        }
        .header-phone__dropdown-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.4rem 1rem;
            border-radius: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            text-align: center;
        }
        .header-phone__dropdown-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(74, 124, 255, 0.05);
        }
        .header-phone__dropdown-divider {
            border-top: 1px solid var(--border);
            margin: 0.5rem 0;
        }
        .header-phone__dropdown-schedule {
            font-size: 0.7rem;
            color: var(--text-second);
            line-height: 1.5;
        }

        /* ---------- Поиск ---------- */
        .header-search {
            background: transparent;
            border: none;
            color: var(--text-second);
            cursor: pointer;
            padding: 0.3rem 0.4rem;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-search:hover {
            color: var(--text);
            background: var(--surface-hover);
        }
        .header-search svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        /* ---------- Правая часть шапки ---------- */
        .header__right {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-shrink: 0;
        }
        .header__right .btn {
            font-size: 0.85rem;
            padding: 0.5rem 1.2rem;
        }

        /* ---------- Модалка поиска ---------- */
        .search-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 8rem;
            animation: fadeIn 0.3s ease;
        }

        .search-modal__container {
            width: 100%;
            max-width: 800px;
            padding: 0 1.8rem;
        }

        .search-modal__input-wrapper {
            display: flex;
            align-items: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.6rem 1.2rem;
            transition: border-color 0.3s;
        }
        .search-modal__input-wrapper:focus-within {
            border-color: var(--accent);
        }
        .search-modal__input-wrapper svg {
            width: 20px;
            height: 20px;
            stroke: var(--text-second);
            flex-shrink: 0;
            margin-right: 0.8rem;
        }
        .search-modal__input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 1.2rem;
            padding: 0.4rem 0;
        }
        .search-modal__input-wrapper input::placeholder {
            color: var(--text-second);
        }
        .search-modal__close {
            background: transparent;
            border: none;
            color: var(--text-second);
            cursor: pointer;
            font-size: 1.5rem;
            padding: 0.2rem 0.4rem;
            transition: color 0.2s;
        }
        .search-modal__close:hover {
            color: var(--text);
        }

        .search-modal__quick-links {
            margin-top: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }
        .search-modal__quick-link {
            color: var(--text-second);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.4rem 1rem;
            border: 1px solid var(--border);
            border-radius: 20px;
            transition: all 0.2s;
        }
        .search-modal__quick-link:hover {
            border-color: var(--accent);
            color: var(--text);
            background: rgba(74, 124, 255, 0.08);
        }

        /* ---------- Модалки авторизации ---------- */
        .auth-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10001;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
            padding: 2rem;
        }

        .auth-modal__content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2.5rem;
            max-width: 460px;
            width: 100%;
            animation: scaleIn 0.3s ease;
            box-shadow: var(--shadow);
            position: relative;
        }

        .auth-modal__close {
            position: absolute;
            top: 1rem;
            right: 1.2rem;
            background: transparent;
            border: none;
            color: var(--text-second);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .auth-modal__close:hover {
            color: var(--text);
        }

        .auth-modal__title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.3rem;
        }
        .auth-modal__sub {
            color: var(--text-second);
            font-size: 0.9rem;
            margin-bottom: 1.8rem;
        }

        .auth-modal__field {
            margin-bottom: 1.2rem;
        }
        .auth-modal__field label {
            display: block;
            color: var(--text-second);
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
            font-weight: 500;
        }
        .auth-modal__field input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.8rem 1rem;
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .auth-modal__field input:focus {
            border-color: var(--accent);
        }
        .auth-modal__field input::placeholder {
            color: var(--text-second);
        }

        .auth-modal__options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 0 1.5rem;
        }
        .auth-modal__options label {
            color: var(--text-second);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }
        .auth-modal__options label input[type="checkbox"] {
            accent-color: var(--accent);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .auth-modal__options .auth-forgot {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        .auth-modal__options .auth-forgot:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        .auth-modal__error {
            background: rgba(255, 71, 87, 0.15);
            border: 1px solid rgba(255, 71, 87, 0.3);
            color: #ff4757;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }
        .auth-modal__error--show {
            display: block;
        }

        .auth-modal__divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            color: var(--text-second);
            font-size: 0.85rem;
            margin: 1rem 0;
        }
        .auth-modal__divider::before,
        .auth-modal__divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .auth-modal__social {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        .auth-modal__social .social-btn {
            flex: 1;
            padding: 0.6rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .auth-modal__social .social-btn:hover {
            border-color: var(--accent);
            background: rgba(74, 124, 255, 0.08);
        }

        .auth-modal__footer {
            margin-top: 1.5rem;
            text-align: center;
            color: var(--text-second);
            font-size: 0.9rem;
        }
        .auth-modal__footer .auth-link {
            color: var(--accent);
            cursor: pointer;
            font-weight: 500;
            transition: color 0.2s;
        }
        .auth-modal__footer .auth-link:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        /* ---------- Чат (FAB) ---------- */
        .chat-fab {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 9998;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            box-shadow: 0 4px 20px rgba(74, 124, 255, 0.5);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            color: #fff;
        }
        .chat-fab:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 30px rgba(74, 124, 255, 0.7);
        }
        .chat-fab svg {
            width: 28px;
            height: 28px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .chat-fab__badge {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #ff4757;
            border: 2px solid var(--bg);
            animation: pulse-badge 2s ease-in-out infinite;
        }

        /* ---------- Модалка чата ---------- */
        .chat-modal {
            position: fixed;
            bottom: 6rem;
            right: 2rem;
            z-index: 9999;
            width: 380px;
            max-width: calc(100vw - 2rem);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            animation: slideUp 0.3s ease;
            overflow: hidden;
            display: none;
        }
        .chat-modal--open {
            display: block;
        }

        .chat-modal__header {
            padding: 0.8rem 1.2rem;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .chat-modal__title {
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-second);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .chat-modal__title .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2ed573;
            display: inline-block;
            animation: pulse-dot 1.5s ease-in-out infinite;
        }
        .chat-modal__close {
            background: transparent;
            border: none;
            color: var(--text-second);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.2rem 0.4rem;
            transition: color 0.2s;
        }
        .chat-modal__close:hover {
            color: var(--text);
        }

        .chat-modal__body {
            padding: 1rem 1.2rem;
            max-height: 280px;
            overflow-y: auto;
        }

        .chat-modal__message {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 0.6rem;
        }
        .chat-modal__avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
            font-size: 0.7rem;
            flex-shrink: 0;
        }
        .chat-modal__bubble {
            background: var(--bg);
            padding: 0.5rem 0.8rem;
            border-radius: 10px;
            font-size: 0.82rem;
            color: var(--text);
            line-height: 1.5;
            max-width: 85%;
        }
        .chat-modal__bubble .time {
            font-size: 0.55rem;
            color: var(--text-second);
            margin-top: 0.2rem;
            display: block;
        }

        .chat-modal__status {
            color: var(--text-second);
            font-size: 0.7rem;
            text-align: center;
            padding: 0.5rem 0;
            border-top: 1px solid var(--border);
            margin-top: 0.5rem;
        }

        .chat-modal__channels {
            display: flex;
            gap: 0.5rem;
            padding: 0.5rem 1.2rem;
            border-top: 1px solid var(--border);
            background: var(--bg);
            flex-wrap: wrap;
        }
        .chat-modal__channel-btn {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 0.2rem 0.8rem;
            color: var(--text-second);
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            text-decoration: none;
        }
        .chat-modal__channel-btn:hover {
            border-color: var(--accent);
            color: var(--text);
            background: rgba(74, 124, 255, 0.08);
        }

        .chat-modal__footer {
            padding: 0.5rem 1.2rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.5rem;
            background: var(--bg);
        }
        .chat-modal__footer input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.4rem 0.8rem;
            color: var(--text);
            font-size: 0.8rem;
            outline: none;
        }
        .chat-modal__footer input::placeholder {
            color: var(--text-second);
        }
        .chat-modal__footer input:focus {
            border-color: var(--accent);
        }
        .chat-modal__footer .send-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0.4rem 1rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: background 0.2s;
        }
        .chat-modal__footer .send-btn:hover {
            background: var(--accent-hover);
        }

        /* ---------- Модалка выбора канала ---------- */
        .channel-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10000;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
            padding: 2rem;
        }

        .channel-modal__content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem 2.5rem;
            max-width: 440px;
            width: 100%;
            text-align: center;
            animation: scaleIn 0.3s ease;
            box-shadow: var(--shadow);
            position: relative;
        }

        .channel-modal__close {
            position: absolute;
            top: 0.8rem;
            right: 1rem;
            background: transparent;
            border: none;
            color: var(--text-second);
            font-size: 1.4rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .channel-modal__close:hover {
            color: var(--text);
        }

        .channel-modal__icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        .channel-modal__title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.3rem;
        }
        .channel-modal__sub {
            font-size: 0.9rem;
            color: var(--text-second);
            margin-bottom: 0.5rem;
        }
        .channel-modal__btn {
            display: inline-block;
            background: var(--accent);
            color: #fff;
            padding: 0.6rem 2rem;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            margin: 0.8rem 0 1rem;
            transition: background 0.2s;
        }
        .channel-modal__btn:hover {
            background: var(--accent-hover);
        }
        .channel-modal__qr-text {
            font-size: 0.8rem;
            color: var(--text-second);
            margin-bottom: 1rem;
        }
        .channel-modal__qr {
            width: 160px;
            height: 160px;
            margin: 0 auto;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            color: var(--text-second);
            flex-direction: column;
        }
        .channel-modal__qr span {
            font-size: 0.7rem;
            color: var(--text-second);
            margin-top: 0.3rem;
        }

        /* ---------- Основной контент ---------- */
        .main {
            padding-top: 0.5rem;
        }

        /* ---------- Hero (главная) ---------- */
        .hero {
            padding: 1rem 0 3rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .hero__subtitle {
            font-size: 1.2rem;
            color: var(--text-second);
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .hero__title {
            font-size: clamp(2.8rem, 5vw, 4.5rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
        }
        .hero__title .static-text {
            display: block;
        }
        .hero__title .slider-text {
            display: block;
            position: relative;
        }
        .hero__title .slider-text .slide-text {
            display: inline-block;
            animation: fadeInUp 0.6s ease;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% 200%;
            animation: gradientShift 3s ease infinite, fadeInUp 0.6s ease;
            font-size: clamp(2.8rem, 5vw, 4.5rem);
        }

        /* ---------- Форма в hero ---------- */
        .hero-form {
            padding: 2rem 2.5rem;
            max-width: 580px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .hero-form__label {
            font-size: 0.95rem;
            color: var(--text-second);
            text-align: left;
        }

        .hero-form__input-group {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .hero-form__input-group input {
            flex: 1;
            min-width: 180px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.8rem 1.2rem;
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .hero-form__input-group input:focus {
            border-color: var(--accent);
        }
        .hero-form__input-group input::placeholder {
            color: var(--text-second);
        }

        .hero-form__checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            text-align: left;
        }
        .hero-form__checkbox-group label {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: var(--text-second);
            font-size: 0.9rem;
            cursor: pointer;
        }
        .hero-form__checkbox-group label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .hero-form__demo-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            display: inline-block;
            text-align: center;
        }
        .hero-form__demo-link:hover {
            text-decoration: underline;
        }

        /* ---------- Навигация (меню под hero) ---------- */
        .nav-tabs {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
            margin: 2.5rem 0 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .nav-tabs__btn {
            color: var(--text-second);
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.25s ease;
            cursor: pointer;
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            background: transparent;
            border: none;
        }
        .nav-tabs__btn:hover {
            color: var(--accent);
            background: rgba(74, 124, 255, 0.08);
        }
        .nav-tabs__btn--active {
            color: var(--accent);
            background: rgba(74, 124, 255, 0.12);
        }

        /* ---------- Карусель ---------- */
        .carousel {
            margin: 1.5rem 0 1.5rem;
            position: relative;
        }
        .carousel__title {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }

        .carousel__wrapper {
            position: relative;
            overflow: hidden;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--surface);
        }

        .carousel__track {
            display: flex;
            transition: transform 0.5s ease-in-out;
        }

        .carousel__slide {
            min-width: 100%;
            padding: 1.5rem 2.5rem;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 2.5rem;
            min-height: 300px;
        }

        .carousel__slide-content {
            flex: 0 0 38%;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            text-align: left;
        }
        .carousel__slide-content h3 {
            font-size: 1.2rem;
            font-weight: 600;
            line-height: 1.3;
        }
        .carousel__slide-content p {
            color: var(--text-second);
            font-size: 0.85rem;
            line-height: 1.5;
        }
        .carousel__slide-content .link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            display: inline-block;
            margin-top: 0.2rem;
        }
        .carousel__slide-content .link:hover {
            text-decoration: underline;
        }

        .carousel__slide-image {
            flex: 1 1 auto;
            min-width: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .carousel__slide-image img {
            width: 100%;
            height: auto;
            max-height: 320px;
            object-fit: contain;
            border-radius: 8px;
            background: var(--bg);
            border: 1px solid var(--border);
        }

        .carousel__btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            backdrop-filter: blur(4px);
        }
        .carousel__btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .carousel__btn--prev {
            left: 12px;
        }
        .carousel__btn--next {
            right: 12px;
        }

        .carousel__dots {
            display: flex;
            justify-content: center;
            gap: 0.6rem;
            margin-top: 1rem;
        }
        .carousel__dots button {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: none;
            background: var(--border);
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            padding: 0;
        }
        .carousel__dots button.active {
            background: var(--accent);
            transform: scale(1.3);
        }
        .carousel__dots button:hover {
            background: var(--text-second);
        }

        /* ---------- Бегущая строка ---------- */
        .ticker {
            position: relative;
            width: 100%;
            overflow: hidden;
            padding: 2rem 0;
            margin: 2rem 0;
            background: transparent;
        }
        .ticker::before,
        .ticker::after {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            width: 120px;
            z-index: 2;
            pointer-events: none;
        }
        .ticker::before {
            left: 0;
            background: linear-gradient(to right, var(--bg) 0%, transparent 100%);
        }
        .ticker::after {
            right: 0;
            background: linear-gradient(to left, var(--bg) 0%, transparent 100%);
        }

        .ticker__track {
            display: flex;
            gap: 3rem;
            animation: brands-scroll 25s linear infinite;
            width: max-content;
            align-items: center;
        }
        .ticker__track img {
            height: 40px;
            width: auto;
            opacity: 0.6;
            filter: grayscale(100%) brightness(0.8);
            transition: opacity 0.3s, filter 0.3s;
            object-fit: contain;
            flex-shrink: 0;
        }
        .ticker__track img:hover {
            opacity: 1;
            filter: grayscale(0%) brightness(1);
        }

        /* ---------- Секция с видео ---------- */
        .section--video {
            padding: 2rem 0;
            margin: 1rem 0 1rem 0;
        }
        .section--video .section__title {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 2rem;
        }

        .video-grid {
            display: grid;
            grid-template-columns: 35% 1fr;
            gap: 3rem;
            align-items: start;
        }

        .video-grid__player {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--surface);
            border: 1px solid var(--border);
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .video-grid__player:hover {
            transform: scale(1.02);
        }
        .video-grid__player .video-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #1a1a2e;
        }

        .video-grid__play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.35);
            transition: background 0.3s;
        }
        .video-grid__play-overlay:hover {
            background: rgba(0, 0, 0, 0.2);
        }
        .video-grid__play-overlay svg {
            width: 55px;
            height: 55px;
            opacity: 0.9;
            transition: transform 0.3s;
        }
        .video-grid__play-overlay:hover svg {
            transform: scale(1.1);
        }
        .video-grid__play-overlay .play-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            margin-top: 0.5rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .video-grid__right {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .video-grid__advantages {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .video-grid__advantage {
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.8rem;
        }
        .video-grid__advantage:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        .video-grid__advantage h3 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.1rem;
        }
        .video-grid__advantage p {
            color: var(--text-second);
            font-size: 0.85rem;
            line-height: 1.5;
        }

        /* ---------- CTA ---------- */
        .cta {
            text-align: center;
            padding: 1.5rem 0 2.5rem;
            border-top: 1px solid var(--border);
            margin-top: 0.5rem;
        }
        .cta .sub-text {
            color: var(--text-second);
            font-size: 0.9rem;
            display: block;
            margin-top: 0.5rem;
        }

        /* ---------- Все инструменты ---------- */
        .section--tools {
            padding: 3rem 0;
            margin: 1rem 0 2rem;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .section--tools .tools-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .section--tools .tools-header h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
        }
        .section--tools .tools-header p {
            color: var(--text-second);
            font-size: 1rem;
            line-height: 1.7;
            max-width: 700px;
            margin: 0 auto;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        .tools-grid__item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem 1.2rem;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            min-height: 72px;
        }
        .tools-grid__item:hover {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(74, 124, 255, 0.1);
            transform: translateY(-2px);
        }
        .tools-grid__item .tool-left {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
            flex: 1;
        }
        .tools-grid__item .tool-left h4 {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.2;
        }
        .tools-grid__item .tool-left p {
            color: var(--text-second);
            font-size: 0.8rem;
            line-height: 1.3;
        }
        .tools-grid__item .tool-icon {
            font-size: 1.8rem;
            flex-shrink: 0;
            width: 44px;
            text-align: center;
        }

        .section--tools .tools-cta {
            text-align: center;
            margin-top: 2.5rem;
        }

        /* ---------- Видео-отзывы ---------- */
        .section--reviews {
            padding: 3rem 0;
            margin: 2rem 0;
        }
        .section--reviews .section__title {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 2rem;
        }

        .reviews-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--surface);
            padding: 1.5rem;
        }

        .reviews-track {
            display: flex;
            gap: 1.5rem;
            transition: transform 0.5s ease-in-out;
        }

        .review-card {
            flex: 0 0 calc(25% - 1.125rem);
            max-width: calc(25% - 1.125rem);
            min-width: calc(25% - 1.125rem);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            flex-shrink: 0;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .review-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: var(--shadow);
        }

        .review-card__thumb {
            width: 100%;
            aspect-ratio: 9/16;
            background: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }
        .review-card__thumb .thumb-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .review-card__thumb .thumb-content .thumb-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        .review-card__thumb .thumb-content .thumb-label {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
        }

        .review-card__play {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(74, 124, 255, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 2;
        }
        .review-card__play svg {
            width: 24px;
            height: 24px;
            fill: #fff;
            margin-left: 4px;
        }

        .review-card__hover {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: opacity 0.3s ease;
            gap: 0.5rem;
            z-index: 3;
        }
        .review-card__thumb:hover .review-card__hover {
            opacity: 1;
        }
        .review-card__thumb:hover .review-card__play {
            transform: translate(-50%, -50%) scale(0.7);
            opacity: 0.7;
        }

        .review-card__hover .watch-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .review-card__hover .watch-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(74, 124, 255, 0.4);
        }
        .review-card__hover .watch-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.8rem;
        }

            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
        }

        .safety-grid__item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: all 0.3s ease;
        }
        .safety-grid__item:hover {
            border-color: var(--accent);
            box-shadow: 0 8px 30px rgba(74, 124, 255, 0.1);
            transform: translateY(-4px);
        }
        .safety-grid__item .icon {
            font-size: 2rem;
            margin-bottom: 0.8rem;
        }
        .safety-grid__item .title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }
        .safety-grid__item .desc {
            color: var(--text-second);
            font-size: 0.85rem;
            line-height: 1.6;
        }

        /* ---------- Материалы ---------- */
        .section--materials {
            padding: 3rem 0;
            margin: 2rem 0;
        }

        .materials-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .materials-header h2 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
        }
        .materials-header .link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .materials-header .link:hover {
            color: var(--accent-hover);
        }

        .materials-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .material-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .material-card:hover {
            border-color: var(--accent);
            box-shadow: 0 8px 30px rgba(74, 124, 255, 0.1);
            transform: translateY(-4px);
        }

        .material-card__image {
            width: 100%;
            height: 160px;
            border-radius: 8px;
            margin-bottom: 0.8rem;
            background: var(--bg);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: var(--text-second);
            overflow: hidden;
        }
        .material-card__image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .material-card__tag {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--accent);
            background: rgba(74, 124, 255, 0.1);
            padding: 0.2rem 0.8rem;
            border-radius: 12px;
            margin-bottom: 0.6rem;
        }
        .material-card__title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            line-height: 1.4;
            margin-bottom: 0.3rem;
        }
        .material-card__desc {
            color: var(--text-second);
            font-size: 0.85rem;
            line-height: 1.6;
        }

        /* ---------- Трансформация ---------- */
        .block--transform {
            padding: 3rem 2rem;
            margin: 2rem 0;
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            text-align: center;
        }

        .block--transform .content {
            max-width: 700px;
            margin: 0 auto;
        }
        .block--transform .title {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .block--transform .desc {
            color: var(--text-second);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 1.8rem;
        }

        /* ---------- FAQ ---------- */
        .section--faq {
            padding: 3rem 0;
            margin: 2rem 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .section--faq .faq-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .section--faq .faq-header h2 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text);
        }

        .faq-list {
            max-width: 800px;
            margin: 0 auto;
        }
        .faq-list__item {
            border-bottom: 1px solid var(--border);
            padding: 0.5rem 0;
        }
        .faq-list__item:last-child {
            border-bottom: none;
        }

        .faq-list__question {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 0;
            cursor: pointer;
            font-weight: 500;
            font-size: 1rem;
            color: var(--text);
            transition: color 0.2s;
        }
        .faq-list__question:hover {
            color: var(--accent);
        }
        .faq-list__question .arrow {
            transition: transform 0.3s;
            color: var(--text-second);
            font-size: 0.8rem;
        }
        .faq-list__question .arrow--open {
            transform: rotate(180deg);
        }

        .faq-list__answer {
            padding: 0 0 1rem 0;
            color: var(--text-second);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        /* ---------- Видео-модал ---------- */
        .video-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
            backdrop-filter: blur(6px);
            padding: 2rem;
        }

        .video-modal__content {
            display: grid;
            grid-template-columns: 55% 1fr;
            gap: 2.5rem;
            width: 100%;
            max-width: 1100px;
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            animation: scaleIn 0.3s ease;
            border: 1px solid var(--border);
            padding: 1.5rem;
            position: relative;
        }

        .video-modal__container {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            background: #000;
            aspect-ratio: 16/9;
        }
        .video-modal__container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #000;
        }

        .video-modal__right {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 1.5rem;
            padding-right: 0.5rem;
        }
        .video-modal__right h3 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
        }
        .video-modal__right p {
            color: var(--text-second);
            font-size: 0.95rem;
            line-height: 1.7;
        }
        .video-modal__right .btn {
            align-self: flex-start;
        }

        .video-modal__close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: #fff;
            font-size: 1.8rem;
            cursor: pointer;
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            transition: background 0.2s, transform 0.2s;
            line-height: 1;
            z-index: 10;
        }
        .video-modal__close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        /* ---------- Футер ---------- */
        .footer {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 3.5rem 0 0;
            margin-top: 2rem;
            width: 100%;
        }

        .footer__grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2rem 1.8rem;
            padding-bottom: 2rem;
        }
        .footer__col h4 {
            font-weight: 600;
            margin-bottom: 1rem;
            font-size: 0.95rem;
            color: var(--text);
        }
        .footer__col ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .footer__col ul li a {
            color: var(--text-second);
            text-decoration: none;
            font-size: 0.88rem;
            transition: color 0.2s;
        }
        .footer__col ul li a:hover {
            color: var(--text);
        }

        .footer__bottom {
            border-top: 1px solid var(--border);
            padding: 1.2rem 0;
            width: 100%;
            background: var(--bg);
        }

        .footer__bottom-content {
            max-width: 1240px;
            margin: 0 auto;
            padding: 0 1.8rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-second);
        }
        .footer__bottom-content a {
            color: var(--text-second);
            text-decoration: none;
            margin: 0 0.6rem;
        }
        .footer__bottom-content a:hover {
            color: var(--text);
        }
        .footer__bottom-content .stars {
            color: #f5b342;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .footer__bottom-content .stars span {

        }
        .footer__bottom-content .stores {

            gap: 1.5rem;
        }
        .footer__bottom-content .stores span {
            color: var(--text-second);
            font-size: 0.8rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .footer__bottom-content .stores span:hover {
            color: var(--text);
        }

        /* ---------- Анимации ---------- */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes scaleIn {
            from {
                transform: scale(0.95);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        @keyframes brands-scroll {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }
        @keyframes pulse-badge {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }
        @keyframes pulse-dot {

                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }
